<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>L weather</title>

  <link rel="icon" type="image/png" href="l-logo.png?v=1">
  <link rel="apple-touch-icon" href="l-logo.png?v=1">

  <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>
  <main class="card">
    <h1 class="logo">
      <img src="l-logo.png" alt="L logo" class="logo-image">
      <span class="logo-text">weather</span>
    </h1>

    <p class="lead">
      現在地と今日のこれからの天気を確認して、Lが一言だけ返します。
    </p>

    <button id="checkButton">天気を確認する</button>

    <div id="result" class="info">
      ボタンを押すと、位置情報の許可を求めます。
    </div>
  </main>
</body>
</html>
