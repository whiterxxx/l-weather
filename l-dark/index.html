<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>L Dark Weather</title>

  <meta name="theme-color" content="#050507" />
  <meta name="apple-mobile-web-app-title" content="L Weather" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="apple-touch-icon.png" />

  <link rel="stylesheet" href="style.css?v=2" />
</head>

<body>
  <main class="app">
    <section class="hero">
      <h1 class="visually-hidden">L Dark Weather</h1>

      <div class="logo-glitch" aria-label="L Dark Weather">
        <img class="l-logo" src="l-logo.png?v=2" alt="L" />
        <span class="logo-noise" aria-hidden="true"></span>
      </div>

      <p class="lead">
        Lが貴女の現在地と天気を確認します。
      </p>

      <button id="checkButton" class="check-button">
        Lから連絡を受ける
      </button>

      <div id="result" class="result">
        <p class="idle-message">
          ボタンを押すと、Lが貴女を追跡します。
        </p>
      </div>
    </section>
  </main>

  <script src="script.js?v=2"></script>
</body>
</html>
