<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>L Dark Weather</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <section class="hero">
      <h1 class="visually-hidden">L Dark Weather</h1>

      <div class="logo-glitch" aria-label="L Dark Weather">
        <img class="l-logo" src="l-logo.png" alt="L" />
      </div>

      <p class="lead">
        Lが貴女の現在地と天気を確認します。
      </p>

      <button id="checkButton" class="check-button">
        Lから連絡を受ける
      </button>

      <div id="result" class="result">
        <p class="idle-message">
          ボタンを押すと、Lが貴女を追跡します。
        </p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
